<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; }
        .header {
            background: #1E293B;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo i { font-size: 28px; color: #10B981; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .nav {
            background: white;
            padding: 0 30px;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #5A6874;
            border-bottom: 2px solid transparent;
        }
        .nav-btn.active {
            color: #10B981;
            border-bottom-color: #10B981;
        }
        .content { padding: 30px; }
        .module-pane { display: none; }
        .module-pane.active { display: block; }
        iframe {
            width: 100%;
            height: calc(100vh - 150px);
            border: none;
            border-radius: 16px;
            background: white;
        }
        .welcome-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            border: 1px solid #E2E8F0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-chart-line"></i><h1>JanQ ERP</h1></div>
        <div class="user-info">
            <span id="userName"></span>
            <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
    </div>
    
    <div class="nav">
        <button class="nav-btn active" data-module="dashboard">Dashboard</button>
        <button class="nav-btn" data-module="ventas">Punto de Venta</button>
        <button class="nav-btn" data-module="inventario">Inventario</button>
        <button class="nav-btn" data-module="clientes">Clientes</button>
        <button class="nav-btn" data-module="reportes">Reportes</button>
    </div>
    
    <div class="content">
        <div id="module-dashboard" class="module-pane active">
            <div class="welcome-card">
                <i class="fas fa-chart-line" style="font-size: 48px; color: #10B981;"></i>
                <h2 style="margin: 15px 0;" id="welcomeMsg">Bienvenido</h2>
                <p>Sistema de gestión empresarial JanQ</p>
            </div>
        </div>
        <div id="module-ventas" class="module-pane"><iframe src="modules/module-ventas/index.html"></iframe></div>
        <div id="module-inventario" class="module-pane"><iframe src="modules/module-inventario/index.html"></iframe></div>
        <div id="module-clientes" class="module-pane"><iframe src="modules/module-clientes/index.html"></iframe></div>
        <div id="module-reportes" class="module-pane"><iframe src="modules/module-reportes/index.html"></iframe></div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('janq_session'));
        if (!session) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('userName').textContent = session.name;
        document.getElementById('welcomeMsg').textContent = `Bienvenido, ${session.name}`;
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const module = btn.dataset.module;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.module-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(`module-${module}`).classList.add('active');
            });
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('janq_session');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
