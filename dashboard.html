<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; }
        .header { background: #1E293B; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { width: 260px; background: white; height: calc(100vh - 70px); position: fixed; border-right: 1px solid #E2E8F0; padding: 20px; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: #F1F5F9; }
        .content { margin-left: 280px; padding: 24px; }
        iframe { width: 100%; height: calc(100vh - 100px); border: none; border-radius: 16px; background: white; }
        .module-pane { display: none; }
        .module-pane.active { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-chart-line"></i> JanQ ERP</h2>
        <div><span id="userName"></span> | <span id="companyName"></span> | <button id="logoutBtn">Salir</button></div>
    </div>
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
        <div id="module-dashboard" class="module-pane active">Bienvenido</div>
        <div id="module-ventas" class="module-pane"><iframe src="modules/module-ventas/index.html"></iframe></div>
        <div id="module-inventario" class="module-pane"><iframe src="modules/module-inventario/index.html"></iframe></div>
        <div id="module-compras" class="module-pane"><iframe src="modules/module-compras/index.html"></iframe></div>
        <div id="module-clientes" class="module-pane"><iframe src="modules/module-clientes/index.html"></iframe></div>
        <div id="module-proveedores" class="module-pane"><iframe src="modules/module-proveedores/index.html"></iframe></div>
        <div id="module-caja" class="module-pane"><iframe src="modules/module-caja/index.html"></iframe></div>
        <div id="module-reportes" class="module-pane"><iframe src="modules/module-reportes/index.html"></iframe></div>
    </div>
    <script src="db.js"></script>
    <script>
        const company = JanQ.getCurrentCompany();
        const user = JanQ.getCurrentUser();
        if (!company || !user) window.location.href = 'index.html';
        document.getElementById('userName').innerText = user.name;
        document.getElementById('companyName').innerText = company.name;

        const modules = [
            { id: 'dashboard', name: 'Dashboard' },
            { id: 'ventas', name: 'Punto de Venta' },
            { id: 'inventario', name: 'Inventario' },
            { id: 'compras', name: 'Compras' },
            { id: 'clientes', name: 'Clientes' },
            { id: 'proveedores', name: 'Proveedores' },
            { id: 'caja', name: 'Arqueo de Caja' },
            { id: 'reportes', name: 'Reportes' }
        ];
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = modules.map(m => `<div class="nav-item" data-module="${m.id}">${m.name}</div>`).join('');
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const moduleId = item.dataset.module;
                document.querySelectorAll('.module-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(`module-${moduleId}`).classList.add('active');
            });
        });
        document.getElementById('logoutBtn').onclick = () => { JanQ.logoutUser(); };
    </script>
</body>
</html>
