<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; padding: 24px; }
        .header { background: #1E293B; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-radius: 16px; margin-bottom: 24px; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; border: 1px solid #E2E8F0; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #10B981; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F8FAFC; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 400px;
        }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-crown"></i> JanQ Admin</h2>
        <button id="logoutBtn" class="btn" style="background:#EF4444; color:white;">Salir</button>
    </div>
    <div class="card">
        <div class="card-header">
            <h3>Empresas</h3>
            <button id="newCompanyBtn" class="btn btn-primary">+ Nueva Empresa</button>
        </div>
        <table id="companiesTable">
            <thead><tr><th>Nombre</th><th>Plan</th><th>Módulos</th><th>Acciones</th></tr></thead>
            <tbody id="companiesBody"></tbody>
        </table>
    </div>
    <div class="card">
        <div class="card-header">
            <h3>Usuarios</h3>
            <button id="newUserBtn" class="btn btn-primary">+ Nuevo Usuario</button>
        </div>
        <table id="usersTable">
            <thead><tr><th>Email</th><th>Nombre</th><th>Empresa</th><th>Rol</th><th>Acciones</th></tr></thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

    <!-- Modal empresa -->
    <div id="companyModal" class="modal">
        <div class="modal-content">
            <h3>Nueva Empresa</h3>
            <input type="text" id="companyName" placeholder="Nombre de la empresa">
            <select id="companyPlan">
                <option value="basic">Básico</option>
                <option value="pro">Profesional</option>
            </select>
            <button id="saveCompanyBtn" class="btn btn-primary">Guardar</button>
            <button id="closeCompanyModal" class="btn" style="background:#E2E8F0; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <!-- Modal usuario -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Usuario</h3>
            <input type="email" id="userEmail" placeholder="Email">
            <input type="text" id="userName" placeholder="Nombre">
            <input type="password" id="userPassword" placeholder="Contraseña">
            <select id="userCompany"></select>
            <select id="userRole">
                <option value="user">Usuario</option>
                <option value="admin">Administrador de empresa</option>
            </select>
            <button id="saveUserBtn" class="btn btn-primary">Guardar</button>
            <button id="closeUserModal" class="btn" style="background:#E2E8F0; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <script src="db.js"></script>
    <script>
        let companies = [];

        async function loadCompanies() {
            companies = await JanQ.getCompanies();
            const tbody = document.getElementById('companiesBody');
            tbody.innerHTML = companies.map(c => `
                <tr>
                    <td>${c.name}</td>
                    <td>${c.plan}</td>
                    <td>${c.modules.join(', ')}</td>
                    <td><button onclick="deleteCompany('${c.id}')">Eliminar</button></td>
                </tr>
            `).join('');
            // Actualizar select de empresas en modal usuario
            const select = document.getElementById('userCompany');
            select.innerHTML = companies.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function deleteCompany(id) {
            if (confirm('¿Eliminar empresa? Se perderán todos los datos.')) {
                await JanQ.db.collection('companies').doc(id).delete();
                loadCompanies();
            }
        }

        async function loadUsers() {
            const snapshot = await JanQ.db.collection('users').get();
            const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.email}</td>
                    <td>${u.name}</td>
                    <td>${companies.find(c => c.id === u.companyId)?.name || 'N/A'}</td>
                    <td>${u.role === 'super_admin' ? 'Super Admin' : u.role === 'admin' ? 'Admin Empresa' : 'Usuario'}</td>
                    <td><button onclick="deleteUser('${u.id}')">Eliminar</button></td>
                </tr>
            `).join('');
        }

        async function deleteUser(uid) {
            if (confirm('¿Eliminar usuario?')) {
                await JanQ.db.collection('users').doc(uid).delete();
                loadUsers();
            }
        }

        document.getElementById('newCompanyBtn').onclick = () => {
            document.getElementById('companyModal').style.display = 'flex';
        };
        document.getElementById('closeCompanyModal').onclick = () => {
            document.getElementById('companyModal').style.display = 'none';
        };
        document.getElementById('saveCompanyBtn').onclick = async () => {
            const name = document.getElementById('companyName').value;
            const plan = document.getElementById('companyPlan').value;
            if (!name) return;
            await JanQ.createCompany(name, plan);
            document.getElementById('companyModal').style.display = 'none';
            loadCompanies();
        };
        document.getElementById('newUserBtn').onclick = () => {
            document.getElementById('userModal').style.display = 'flex';
        };
        document.getElementById('closeUserModal').onclick = () => {
            document.getElementById('userModal').style.display = 'none';
        };
        document.getElementById('saveUserBtn').onclick = async () => {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            const name = document.getElementById('userName').value;
            const companyId = document.getElementById('userCompany').value;
            const role = document.getElementById('userRole').value;
            if (!email || !password || !name || !companyId) return;
            await JanQ.registerUser(email, password, name, companyId, role);
            document.getElementById('userModal').style.display = 'none';
            loadUsers();
        };
        document.getElementById('logoutBtn').onclick = () => {
            JanQ.logoutUser();
            window.location.href = 'index.html';
        };

        loadCompanies();
        loadUsers();
    </script>
</body>
</html>
