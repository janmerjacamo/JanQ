<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Sistema ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .login-header {
            background: #1E293B;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header i { font-size: 48px; color: #10B981; margin-bottom: 15px; }
        .login-header h1 { font-size: 28px; font-weight: 600; }
        .login-header p { font-size: 13px; opacity: 0.8; margin-top: 5px; }
        .login-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-login:hover { background: #059669; }
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            background: #FEF2F2;
            color: #DC2626;
            border-left: 3px solid #DC2626;
        }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #F8FAFC;
            border-radius: 12px;
            font-size: 12px;
            color: #64748B;
            text-align: center;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .register-link a {
            color: #10B981;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-chart-line"></i>
            <h1>JanQ ERP</h1>
            <p>Sistema integral de gestión</p>
        </div>
        <div class="login-body">
            <div id="alertMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" placeholder="admin@janq.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-login">Ingresar al sistema</button>
            </form>
            <div class="register-link">
                ¿No tienes cuenta? <a id="showRegister">Regístrate aquí</a>
            </div>
            <div class="demo-info">
                <i class="fas fa-info-circle"></i> Usuario demo: admin@janq.com / admin123
            </div>
        </div>
    </div>
    
    <div id="registerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:white; border-radius:24px; padding:30px; width:400px; max-width:90%;">
            <h2 style="margin-bottom:20px">Registro de usuario</h2>
            <input type="text" id="regName" placeholder="Nombre completo" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #E2E8F0; border-radius:12px;">
            <input type="email" id="regEmail" placeholder="Correo electrónico" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #E2E8F0; border-radius:12px;">
            <input type="password" id="regPassword" placeholder="Contraseña" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #E2E8F0; border-radius:12px;">
            <button onclick="registrarUsuario()" style="width:100%; padding:12px; background:#10B981; color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer;">Registrarse</button>
            <button onclick="closeRegister()" style="width:100%; margin-top:10px; padding:10px; background:#E2E8F0; border:none; border-radius:12px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        // Inicializar usuarios por defecto
        if (!localStorage.getItem('janq_users')) {
            const defaultUsers = {
                'admin@janq.com': { password: 'admin123', name: 'Administrador', role: 'admin' }
            };
            localStorage.setItem('janq_users', JSON.stringify(defaultUsers));
        }
        
        function showAlert(msg) {
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.innerHTML = `<div class="alert">${msg}</div>`;
            setTimeout(() => { alertDiv.innerHTML = ''; }, 4000);
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('janq_users'));
            
            if (users[email] && users[email].password === password) {
                const session = { email: email, name: users[email].name, role: users[email].role };
                localStorage.setItem('janq_session', JSON.stringify(session));
                window.location.href = 'dashboard.html';
            } else {
                showAlert('Correo o contraseña incorrectos');
            }
        });
        
        // Registro
        document.getElementById('showRegister').addEventListener('click', () => {
            document.getElementById('registerModal').style.display = 'flex';
        });
        
        window.registrarUsuario = () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!name || !email || !password) {
                alert('Complete todos los campos');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('janq_users'));
            if (users[email]) {
                alert('El correo ya está registrado');
                return;
            }
            
            users[email] = { password: password, name: name, role: 'user' };
            localStorage.setItem('janq_users', JSON.stringify(users));
            alert('Usuario registrado correctamente. Ahora puedes iniciar sesión.');
            closeRegister();
        };
        
        window.closeRegister = () => {
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('regName').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
        };
        
        // Si ya hay sesión, ir al dashboard
        if (localStorage.getItem('janq_session')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
