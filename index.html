<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ ERP - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .login-header {
            background: #1E293B;
            padding: 40px 30px;
            text-align: center;
        }
        .login-header i { font-size: 48px; color: #10B981; }
        .login-header h1 { color: white; font-size: 28px; }
        .login-header p { color: #94A3B8; font-size: 14px; }
        .login-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 13px; color: #475569; margin-bottom: 8px; display: block; }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 14px;
            font-size: 14px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-msg { background: #FEF2F2; color: #DC2626; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .demo-info { margin-top: 20px; text-align: center; font-size: 12px; color: #64748B; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-chart-line"></i>
            <h1>JanQ ERP</h1>
            <p>Plataforma de gestión empresarial</p>
        </div>
        <div class="login-body">
            <div id="errorMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            <div class="demo-info">
                <i class="fas fa-info-circle"></i> Usuario super admin: admin@janq.com / admin123
            </div>
        </div>
    </div>
    <script src="db.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = await JanQ.loginUser(email, password);
            if (!result.success) {
                document.getElementById('errorMsg').innerHTML = `<div class="error-msg">${result.error}</div>`;
            }
        });
    </script>
</body>
</html>
