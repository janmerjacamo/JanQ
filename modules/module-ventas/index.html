<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Ventas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .pos { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .search { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; max-height: 500px; overflow-y: auto; }
        .product { border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor: pointer; }
        .product:hover { border-color: #10B981; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .total { font-size: 24px; font-weight: bold; margin: 20px 0; }
        .checkout { background: #10B981; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Punto de Venta</h2>
    <div class="pos">
        <div><input type="text" id="search" class="search" placeholder="Buscar..."><div id="products" class="products"></div></div>
        <div><h3>Carrito</h3><div id="cart"></div><div class="total" id="total">$0</div><button class="checkout" onclick="checkout()">Cobrar</button></div>
    </div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        let cart = [];
        function renderProducts() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = productos.filter(p => p.nombre.toLowerCase().includes(search));
            document.getElementById('products').innerHTML = filtered.map(p => `<div class="product" onclick="addToCart(${p.id})"><strong>${p.nombre}</strong><br>Stock: ${p.stock}<br>$${p.precio}</div>`).join('');
        }
        function addToCart(id) {
            const p = productos.find(p => p.id === id);
            if (!p || p.stock <= 0) return;
            const existing = cart.find(i => i.id === id);
            if (existing) existing.cantidad++;
            else cart.push({ ...p, cantidad: 1 });
            renderCart();
        }
        function renderCart() {
            document.getElementById('cart').innerHTML = cart.map(i => `<div class="cart-item"><div>${i.nombre} x${i.cantidad}</div><div>$${i.precio * i.cantidad}</div></div>`).join('');
            const total = cart.reduce((s, i) => s + (i.precio * i.cantidad), 0);
            document.getElementById('total').innerHTML = `$${total}`;
        }
        function checkout() {
            if (cart.length === 0) return;
            cart.forEach(i => { const p = productos.find(prod => prod.id === i.id); if (p) p.stock -= i.cantidad; });
            localStorage.setItem('janq_productos', JSON.stringify(productos));
            let ventas = JSON.parse(localStorage.getItem('janq_ventas')) || [];
            ventas.push({ id: Date.now(), fecha: new Date().toISOString(), items: cart.map(i => ({ nombre: i.nombre, cantidad: i.cantidad, precio: i.precio })), total: cart.reduce((s, i) => s + (i.precio * i.cantidad), 0) });
            localStorage.setItem('janq_ventas', JSON.stringify(ventas));
            cart = [];
            renderCart();
            renderProducts();
            if (window.parent.loadStats) window.parent.loadStats();
            alert('Venta completada');
        }
        document.getElementById('search').addEventListener('input', renderProducts);
        renderProducts();
    </script>
</body>
</html>
