<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Punto de Venta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .container { max-width: 1200px; margin: 0 auto; }
        .pos { display: flex; gap: 20px; flex-wrap: wrap; }
        .productos { flex: 2; }
        .carrito { flex: 1; border: 1px solid #ddd; padding: 16px; border-radius: 16px; }
        .search { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; max-height: 500px; overflow-y: auto; }
        .producto { border: 1px solid #ddd; border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s; }
        .producto:hover { border-color: #10B981; background: #F0FDF4; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .total { font-size: 20px; font-weight: bold; margin: 16px 0; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Punto de Venta</h2>
        <div class="pos">
            <div class="productos">
                <input type="text" id="search" class="search" placeholder="Buscar producto...">
                <div id="productosGrid" class="grid"></div>
            </div>
            <div class="carrito">
                <h3>Carrito</h3>
                <div id="cartItems"></div>
                <div class="total" id="total">$0.00</div>
                <button class="btn" id="checkoutBtn">Cobrar</button>
            </div>
        </div>
    </div>
    <script src="../../db.js"></script>
    <script>
        let companyId = null;
        let productos = [];
        let cart = [];

        async function init() {
            const company = JanQ.getCurrentCompany();
            if (!company) {
                window.location.href = '../../index.html';
                return;
            }
            companyId = company.id;
            await loadProductos();
            document.getElementById('search').addEventListener('input', filterProductos);
            document.getElementById('checkoutBtn').addEventListener('click', realizarVenta);
        }

        async function loadProductos() {
            const productosData = await JanQ.getProductos(companyId);
            productos = productosData;
            filterProductos();
        }

        function filterProductos() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const filtered = productos.filter(p => p.nombre.toLowerCase().includes(searchTerm));
            const grid = document.getElementById('productosGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">No hay productos</div>';
                return;
            }
            grid.innerHTML = filtered.map(p => `
                <div class="producto" onclick="agregarAlCarrito('${p.id}')">
                    <strong>${p.nombre}</strong><br>
                    Stock: ${p.stock}<br>
                    $${p.precio}
                </div>
            `).join('');
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            if (!producto || producto.stock <= 0) return;
            const existente = cart.find(i => i.id === id);
            if (existente) {
                existente.cantidad++;
            } else {
                cart.push({ ...producto, cantidad: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p>Carrito vacío</p>';
                document.getElementById('total').innerHTML = '$0.00';
                return;
            }
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>${item.nombre} x${item.cantidad}</div>
                    <div>$${(item.precio * item.cantidad).toFixed(2)}</div>
                </div>
            `).join('');
            const total = cart.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            document.getElementById('total').innerHTML = `$${total.toFixed(2)}`;
        }

        async function realizarVenta() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            
            for (const item of cart) {
                const producto = productos.find(p => p.id === item.id);
                if (producto) {
                    producto.stock -= item.cantidad;
                    await JanQ.updateProducto(companyId, item.id, { stock: producto.stock });
                }
            }
            
            const venta = {
                items: cart.map(i => ({ nombre: i.nombre, cantidad: i.cantidad, precio: i.precio })),
                total: total,
                fecha: new Date().toISOString()
            };
            await JanQ.addVenta(companyId, venta);
            
            for (const item of cart) {
                await JanQ.addMovimiento(companyId, {
                    productoId: item.id,
                    productoNombre: item.nombre,
                    tipo: 'salida',
                    entrada: 0,
                    salida: item.cantidad,
                    stockActual: productos.find(p => p.id === item.id).stock,
                    referencia: 'Venta POS'
                });
            }
            
            cart = [];
            renderCart();
            await loadProductos();
            alert('Venta completada');
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
        }

        init();
    </script>
</body>
</html>
