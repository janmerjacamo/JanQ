<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Punto de Venta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .pos-container { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
        .search-box { width: 100%; padding: 14px; border: 1px solid #E2E8F0; border-radius: 12px; margin-bottom: 20px; font-size: 16px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-height: 600px; overflow-y: auto; }
        .product-card {
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .product-card:hover { border-color: #10B981; background: #ECFDF5; }
        .product-card .name { font-weight: 600; }
        .product-card .price { color: #10B981; font-weight: 600; margin-top: 5px; }
        .product-card .stock { font-size: 12px; color: #64748B; }
        .cart-container { border: 1px solid #E2E8F0; border-radius: 16px; padding: 20px; background: #F8FAFC; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #E2E8F0; }
        .cart-item-qty { display: flex; align-items: center; gap: 10px; }
        .cart-item-qty button { background: #E2E8F0; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
        .cart-total { font-size: 28px; font-weight: 700; margin: 20px 0; text-align: right; }
        .btn-checkout { background: #10B981; color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; font-size: 16px; }
        .cliente-info { margin-bottom: 15px; }
        .cliente-info input { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 8px; }
    </style>
</head>
<body>
    <h2><i class="fas fa-shopping-cart"></i> Punto de Venta</h2>
    <div class="pos-container">
        <div>
            <input type="text" id="search" class="search-box" placeholder="Buscar producto por nombre o código...">
            <div id="productsGrid" class="products-grid"></div>
        </div>
        <div>
            <div class="cart-container">
                <h3>Carrito de compras</h3>
                <div class="cliente-info">
                    <input type="text" id="clienteNombre" placeholder="Nombre del cliente (opcional)">
                </div>
                <div id="cartItems"></div>
                <div class="cart-total" id="cartTotal">$0</div>
                <button class="btn-checkout" onclick="checkout()">Cobrar</button>
            </div>
        </div>
    </div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        let cart = [];
        
        function renderProducts() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = productos.filter(p => 
                p.nombre.toLowerCase().includes(search) || 
                p.codigo.toLowerCase().includes(search)
            );
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <div class="name">${p.nombre}</div>
                    <div class="stock">Stock: ${p.stock}</div>
                    <div class="price">$${p.precioVenta}</div>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = productos.find(p => p.id === productId);
            if (!product || product.stock <= 0) return;
            
            const existing = cart.find(i => i.id === productId);
            if (existing) {
                existing.cantidad++;
            } else {
                cart.push({ ...product, cantidad: 1 });
            }
            renderCart();
        }
        
        function renderCart() {
            const cartDiv = document.getElementById('cartItems');
            cartDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <div><strong>${item.nombre}</strong></div>
                        <div class="cart-item-qty">
                            <button onclick="updateQty(${item.id}, -1)">-</button>
                            <span>${item.cantidad}</span>
                            <button onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <div>$${(item.precioVenta * item.cantidad).toFixed(2)}</div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, i) => sum + (i.precioVenta * i.cantidad), 0);
            document.getElementById('cartTotal').innerHTML = `$${total.toFixed(2)}`;
        }
        
        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.cantidad += delta;
                if (item.cantidad <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                renderCart();
            }
        }
        
        function checkout() {
            if (cart.length === 0) return;
            
            const clienteNombre = document.getElementById('clienteNombre').value || 'Consumidor final';
            
            // Actualizar stock
            cart.forEach(item => {
                const product = productos.find(p => p.id === item.id);
                if (product) product.stock -= item.cantidad;
            });
            localStorage.setItem('janq_productos', JSON.stringify(productos));
            
            const venta = {
                id: Date.now(),
                fecha: new Date().toISOString(),
                cliente: clienteNombre,
                items: cart.map(i => ({ nombre: i.nombre, cantidad: i.cantidad, precio: i.precioVenta })),
                subtotal: cart.reduce((sum, i) => sum + (i.precioVenta * i.cantidad), 0),
                total: cart.reduce((sum, i) => sum + (i.precioVenta * i.cantidad), 0)
            };
            
            let ventas = JSON.parse(localStorage.getItem('janq_ventas')) || [];
            ventas.push(venta);
            localStorage.setItem('janq_ventas', JSON.stringify(ventas));
            
            cart = [];
            renderCart();
            renderProducts();
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
            alert(`Venta completada. Total: $${venta.total.toFixed(2)}`);
        }
        
        document.getElementById('search').addEventListener('input', renderProducts);
        renderProducts();
    </script>
</body>
</html>
