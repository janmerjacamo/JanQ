<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Proveedores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .btn { background: #10B981; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 400px; }
        input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>
    <h2>Proveedores</h2>
    <button class="btn" onclick="openModal()">+ Nuevo Proveedor</button>
    <table id="table">
        <thead><tr><th>Nombre</th><th>Contacto</th><th>Teléfono</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Proveedor</h3>
            <input id="nombre" placeholder="Nombre">
            <input id="contacto" placeholder="Contacto">
            <input id="telefono" placeholder="Teléfono">
            <button class="btn" onclick="saveProveedor()">Guardar</button>
            <button class="btn" style="background:#ccc;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
    <script src="../../db.js"></script>
    <script>
        let companyId = null;
        async function init() {
            const company = JanQ.getCurrentCompany();
            if (!company) {
                window.location.href = '../../index.html';
                return;
            }
            companyId = company.id;
            await loadProveedores();
        }
        async function loadProveedores() {
            const proveedores = await JanQ.getProveedores(companyId);
            const tbody = document.getElementById('tbody');
            if (proveedores.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No hay proveedores</td></tr>';
                return;
            }
            tbody.innerHTML = proveedores.map(p => `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.contacto}</td>
                    <td>${p.telefono}</td>
                    <td><button onclick="deleteProveedor('${p.id}')">Eliminar</button></td>
                </tr>
            `).join('');
        }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        async function saveProveedor() {
            const proveedor = {
                nombre: document.getElementById('nombre').value,
                contacto: document.getElementById('contacto').value,
                telefono: document.getElementById('telefono').value
            };
            await JanQ.addProveedor(companyId, proveedor);
            closeModal();
            loadProveedores();
        }
        async function deleteProveedor(id) {
            if (confirm('¿Eliminar proveedor?')) {
                await JanQ.deleteProveedor(companyId, id);
                loadProveedores();
            }
        }
        init();
    </script>
</body>
</html>
