<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Proveedores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 24px; }
        .btn-primary { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F8FAFC; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 450px;
        }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #E2E8F0; border-radius: 8px; }
        .btn-save { background: #10B981; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-building"></i> Proveedores</h2>
        <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Nuevo Proveedor</button>
    </div>
    <table>
        <thead><tr><th>Nombre</th><th>Contacto</th><th>Teléfono</th><th>Dirección</th><th></th></tr></thead>
        <tbody id="proveedoresTable"></tbody>
    </table>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Proveedor</h3>
            <input type="text" id="nombre" placeholder="Nombre de la empresa">
            <input type="text" id="contacto" placeholder="Persona de contacto">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <input type="text" id="direccion" placeholder="Dirección">
            <button class="btn-save" onclick="saveProveedor()">Guardar</button>
        </div>
    </div>
    <script>
        let proveedores = JSON.parse(localStorage.getItem('janq_proveedores')) || [];
        
        function renderTable() {
            const tbody = document.getElementById('proveedoresTable');
            tbody.innerHTML = proveedores.map(p => `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.contacto}</td>
                    <td>${p.telefono}</td>
                    <td>${p.direccion}</td>
                    <td><button onclick="deleteProveedor(${p.id})" style="color:#DC2626; background:none; border:none">Eliminar</button></td>
                </tr>
            `).join('');
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
        }
        
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function saveProveedor() {
            const proveedor = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value,
                contacto: document.getElementById('contacto').value,
                telefono: document.getElementById('telefono').value,
                direccion: document.getElementById('direccion').value
            };
            proveedores.push(proveedor);
            localStorage.setItem('janq_proveedores', JSON.stringify(proveedores));
            renderTable();
            closeModal();
            document.getElementById('nombre').value = '';
            document.getElementById('contacto').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('direccion').value = '';
        }
        
        function deleteProveedor(id) {
            proveedores = proveedores.filter(p => p.id !== id);
            localStorage.setItem('janq_proveedores', JSON.stringify(proveedores));
            renderTable();
        }
        
        renderTable();
    </script>
</body>
</html>
