<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .card { background: #f8fafc; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .btn-danger { background: #EF4444; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Configuración</h2>
    <div class="card"><h3>Datos de la empresa</h3><input type="text" id="empresa" placeholder="Nombre de la empresa"><button class="btn" onclick="guardar()">Guardar</button></div>
    <div class="card"><h3>Respaldo</h3><button class="btn" onclick="exportar()">Exportar respaldo</button><input type="file" id="restore"><button class="btn" onclick="restaurar()">Restaurar</button></div>
    <div class="card"><h3>Peligro</h3><button class="btn btn-danger" onclick="limpiar()">Limpiar todos los datos</button></div>
    <script>
        function guardar() { localStorage.setItem('janq_empresa', document.getElementById('empresa').value); alert('Guardado'); }
        function exportar() { const data = { productos: JSON.parse(localStorage.getItem('janq_productos')), ventas: JSON.parse(localStorage.getItem('janq_ventas')), clientes: JSON.parse(localStorage.getItem('janq_clientes')), proveedores: JSON.parse(localStorage.getItem('janq_proveedores')) }; const blob = new Blob([JSON.stringify(data)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'janq_respaldo.json'; a.click(); }
        function restaurar() { const file = document.getElementById('restore').files[0]; if(file){ const reader = new FileReader(); reader.onload = function(e) { const data = JSON.parse(e.target.result); if(data.productos) localStorage.setItem('janq_productos', JSON.stringify(data.productos)); if(data.ventas) localStorage.setItem('janq_ventas', JSON.stringify(data.ventas)); if(data.clientes) localStorage.setItem('janq_clientes', JSON.stringify(data.clientes)); if(data.proveedores) localStorage.setItem('janq_proveedores', JSON.stringify(data.proveedores)); alert('Restaurado'); location.reload(); }; reader.readAsText(file); } }
        function limpiar() { if(confirm('¿Eliminar todos los datos?')){ localStorage.clear(); alert('Datos eliminados'); location.reload(); } }
    </script>
</body>
</html>
