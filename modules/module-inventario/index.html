<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .btn { background: #10B981; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 400px; }
        input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>
    <h2>Inventario</h2>
    <button class="btn" onclick="openModal()">+ Nuevo Producto</button>
    <table id="table">
        <thead><tr><th>Nombre</th><th>Código</th><th>Stock</th><th>Precio</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <input id="nombre" placeholder="Nombre">
            <input id="codigo" placeholder="Código">
            <input id="stock" placeholder="Stock" type="number">
            <input id="precio" placeholder="Precio" type="number">
            <button class="btn" onclick="saveProduct()">Guardar</button>
            <button class="btn" style="background:#ccc;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
    <script src="../../db.js"></script>
    <script>
        let companyId = null;
        async function init() {
            const company = JanQ.getCurrentCompany();
            if (!company) {
                window.location.href = '../../index.html';
                return;
            }
            companyId = company.id;
            await loadProducts();
        }
        async function loadProducts() {
            const productos = await JanQ.getProductos(companyId);
            const tbody = document.getElementById('tbody');
            if (productos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No hay productos</td></tr>';
                return;
            }
            tbody.innerHTML = productos.map(p => `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.codigo}</td>
                    <td>${p.stock}</td>
                    <td>$${p.precio}</td>
                    <td><button onclick="deleteProduct('${p.id}')">Eliminar</button></td>
                </tr>
            `).join('');
        }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        async function saveProduct() {
            const producto = {
                nombre: document.getElementById('nombre').value,
                codigo: document.getElementById('codigo').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                precio: parseFloat(document.getElementById('precio').value) || 0
            };
            await JanQ.addProducto(companyId, producto);
            closeModal();
            loadProducts();
        }
        async function deleteProduct(id) {
            if (confirm('¿Eliminar?')) {
                await JanQ.deleteProducto(companyId, id);
                loadProducts();
            }
        }
        init();
    </script>
</body>
</html>
