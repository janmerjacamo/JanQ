<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 15px; }
        .btn-primary { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-danger { background: #FEF2F2; color: #DC2626; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F8FAFC; font-weight: 600; }
        .search-box { padding: 10px; border: 1px solid #E2E8F0; border-radius: 8px; width: 250px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 500px;
            max-width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }
        .btn-save { background: #10B981; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; }
        .low-stock { background: #FEF2F2; color: #DC2626; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-boxes"></i> Inventario de Productos</h2>
        <div>
            <input type="text" id="searchInput" class="search-box" placeholder="Buscar producto...">
            <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Nuevo Producto</button>
        </div>
    </div>
    <div style="overflow-x: auto;">
        <table id="productosTable">
            <thead>
                <tr><th>Código</th><th>Producto</th><th>Categoría</th><th>Tallas</th><th>Stock</th><th>Precio Compra</th><th>Precio Venta</th><th></th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <input type="text" id="codigo" placeholder="Código SKU">
            <input type="text" id="nombre" placeholder="Nombre del producto">
            <input type="text" id="categoria" placeholder="Categoría (Ej: Camisas, Pantalones)">
            <input type="text" id="tallas" placeholder="Tallas (S,M,L,XL)">
            <input type="number" id="stock" placeholder="Stock inicial">
            <input type="number" id="precioCompra" placeholder="Precio de compra">
            <input type="number" id="precioVenta" placeholder="Precio de venta">
            <button class="btn-save" onclick="saveProduct()">Guardar Producto</button>
        </div>
    </div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        
        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = productos.filter(p => p.nombre.toLowerCase().includes(search) || p.codigo.toLowerCase().includes(search));
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map(p => `
                <tr class="${p.stock < 5 ? 'low-stock' : ''}">
                    <td>${p.codigo}</td>
                    <td><strong>${p.nombre}</strong></td>
                    <td>${p.categoria || '-'}</td>
                    <td>${p.tallas || '-'}</td>
                    <td>${p.stock}</td>
                    <td>$${p.precioCompra}</td>
                    <td>$${p.precioVenta}</td>
                    <td><button class="btn-danger" onclick="deleteProduct(${p.id})">Eliminar</button></td>
                </tr>
            `).join('');
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
        }
        
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function saveProduct() {
            const producto = {
                id: Date.now(),
                codigo: document.getElementById('codigo').value,
                nombre: document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                tallas: document.getElementById('tallas').value,
                stock: parseInt(document.getElementById('stock').value) || 0,
                precioCompra: parseFloat(document.getElementById('precioCompra').value) || 0,
                precioVenta: parseFloat(document.getElementById('precioVenta').value) || 0
            };
            productos.push(producto);
            localStorage.setItem('janq_productos', JSON.stringify(productos));
            renderTable();
            closeModal();
            document.getElementById('codigo').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('categoria').value = '';
            document.getElementById('tallas').value = '';
            document.getElementById('stock').value = '';
            document.getElementById('precioCompra').value = '';
            document.getElementById('precioVenta').value = '';
        }
        
        function deleteProduct(id) {
            if (confirm('¿Eliminar este producto?')) {
                productos = productos.filter(p => p.id !== id);
                localStorage.setItem('janq_productos', JSON.stringify(productos));
                renderTable();
            }
        }
        
        document.getElementById('searchInput').addEventListener('input', renderTable);
        renderTable();
        window.deleteProduct = deleteProduct;
    </script>
</body>
</html>
