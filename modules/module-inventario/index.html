<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 20px; }
        .btn-add { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 400px; }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn-save { background: #10B981; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Inventario de Productos</h2>
    <button class="btn-add" onclick="openModal()">+ Nuevo Producto</button>
    <table id="productosTable">
        <thead><tr><th>Nombre</th><th>Código</th><th>Stock</th><th>Precio</th><th></th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="codigo" placeholder="Código">
            <input type="number" id="stock" placeholder="Stock">
            <input type="number" id="precio" placeholder="Precio">
            <button class="btn-save" onclick="saveProduct()">Guardar</button>
        </div>
    </div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = productos.map(p => `
                <tr><td>${p.nombre}</td><td>${p.codigo}</td><td>${p.stock}</td><td>$${p.precio}</td>
                <td><button onclick="deleteProduct(${p.id})">Eliminar</button></td></tr>
            `).join('');
        }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function saveProduct() {
            const producto = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value,
                codigo: document.getElementById('codigo').value,
                stock: parseInt(document.getElementById('stock').value),
                precio: parseFloat(document.getElementById('precio').value)
            };
            productos.push(producto);
            localStorage.setItem('janq_productos', JSON.stringify(productos));
            renderTable();
            closeModal();
        }
        function deleteProduct(id) {
            productos = productos.filter(p => p.id !== id);
            localStorage.setItem('janq_productos', JSON.stringify(productos));
            renderTable();
        }
        renderTable();
    </script>
</body>
</html>
