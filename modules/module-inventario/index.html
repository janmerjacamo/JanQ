<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 400px; }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Inventario</h2>
    <button class="btn" onclick="openModal()">+ Nuevo Producto</button>
    <table id="table">
        <thead><tr><th>Nombre</th><th>Código</th><th>Stock</th><th>Precio</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <div id="modal" class="modal"><div class="modal-content"><h3>Nuevo Producto</h3><input id="nombre" placeholder="Nombre"><input id="codigo" placeholder="Código"><input id="stock" placeholder="Stock"><input id="precio" placeholder="Precio"><button class="btn" onclick="save()">Guardar</button></div></div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        function render() { document.getElementById('tbody').innerHTML = productos.map(p => `<tr><td>${p.nombre}</td><td>${p.codigo}</td><td>${p.stock}</td><td>$${p.precio}</td><td><button onclick="eliminar(${p.id})">Eliminar</button></td></tr>`).join(''); if(window.parent.loadStats) window.parent.loadStats(); }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function save() { productos.push({ id: Date.now(), nombre: document.getElementById('nombre').value, codigo: document.getElementById('codigo').value, stock: parseInt(document.getElementById('stock').value), precio: parseFloat(document.getElementById('precio').value) }); localStorage.setItem('janq_productos', JSON.stringify(productos)); render(); document.getElementById('modal').style.display = 'none'; }
        function eliminar(id) { productos = productos.filter(p => p.id !== id); localStorage.setItem('janq_productos', JSON.stringify(productos)); render(); }
        render();
    </script>
</body>
</html>
