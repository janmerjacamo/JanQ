<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 400px; }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Clientes</h2>
    <button class="btn" onclick="openModal()">+ Nuevo Cliente</button>
    <table><thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th></th></tr></thead><tbody id="tbody"></tbody></table>
    <div id="modal" class="modal"><div class="modal-content"><h3>Nuevo Cliente</h3><input id="nombre" placeholder="Nombre"><input id="email" placeholder="Email"><input id="telefono" placeholder="Teléfono"><button class="btn" onclick="save()">Guardar</button></div></div>
    <script>
        let clientes = JSON.parse(localStorage.getItem('janq_clientes')) || [];
        function render() { document.getElementById('tbody').innerHTML = clientes.map(c => `<tr><td>${c.nombre}</td><td>${c.email}</td><td>${c.telefono}</td><td><button onclick="eliminar(${c.id})">Eliminar</button></td></tr>`).join(''); if(window.parent.loadStats) window.parent.loadStats(); }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function save() { clientes.push({ id: Date.now(), nombre: document.getElementById('nombre').value, email: document.getElementById('email').value, telefono: document.getElementById('telefono').value }); localStorage.setItem('janq_clientes', JSON.stringify(clientes)); render(); document.getElementById('modal').style.display = 'none'; }
        function eliminar(id) { clientes = clientes.filter(c => c.id !== id); localStorage.setItem('janq_clientes', JSON.stringify(clientes)); render(); }
        render();
    </script>
</body>
</html>
