<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 24px; }
        .btn-primary { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F8FAFC; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 450px;
        }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #E2E8F0; border-radius: 8px; }
        .btn-save { background: #10B981; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-users"></i> Clientes</h2>
        <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Nuevo Cliente</button>
    </div>
    <table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Dirección</th><th></th></tr></thead>
        <tbody id="clientesTable"></tbody>
    </table>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nuevo Cliente</h3>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="email" id="email" placeholder="Email">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <input type="text" id="direccion" placeholder="Dirección">
            <button class="btn-save" onclick="saveCliente()">Guardar</button>
        </div>
    </div>
    <script>
        let clientes = JSON.parse(localStorage.getItem('janq_clientes')) || [];
        
        function renderTable() {
            const tbody = document.getElementById('clientesTable');
            tbody.innerHTML = clientes.map(c => `
                <tr><td>${c.nombre}</td><td>${c.email}</td><td>${c.telefono}</td><td>${c.direccion}</td><td><button onclick="deleteCliente(${c.id})" style="color:#DC2626; background:none; border:none">Eliminar</button></td></tr>
            `).join('');
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
        }
        
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function saveCliente() {
            const cliente = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                direccion: document.getElementById('direccion').value
            };
            clientes.push(cliente);
            localStorage.setItem('janq_clientes', JSON.stringify(clientes));
            renderTable();
            closeModal();
            document.getElementById('nombre').value = '';
            document.getElementById('email').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('direccion').value = '';
        }
        
        function deleteCliente(id) {
            clientes = clientes.filter(c => c.id !== id);
            localStorage.setItem('janq_clientes', JSON.stringify(clientes));
            renderTable();
        }
        
        renderTable();
    </script>
</body>
</html>
