<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Reportes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #F8FAFC; padding: 20px; border-radius: 16px; text-align: center; }
        .stat-card i { font-size: 32px; color: #10B981; margin-bottom: 10px; }
        .stat-card h3 { font-size: 32px; font-weight: 700; }
        .stat-card p { color: #64748B; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F8FAFC; }
        .btn-export { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2><i class="fas fa-chart-bar"></i> Reportes</h2>
        <button class="btn-export" onclick="exportToCSV()"><i class="fas fa-download"></i> Exportar CSV</button>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-box"></i><h3 id="totalProductos">0</h3><p>Productos</p></div>
        <div class="stat-card"><i class="fas fa-shopping-cart"></i><h3 id="totalVentas">0</h3><p>Ventas</p></div>
        <div class="stat-card"><i class="fas fa-dollar-sign"></i><h3 id="ingresos">$0</h3><p>Ingresos totales</p></div>
        <div class="stat-card"><i class="fas fa-chart-line"></i><h3 id="productosBajoStock">0</h3><p>Stock bajo</p></div>
    </div>
    <h3>Últimas ventas</h3>
    <div style="overflow-x: auto;">
        <table id="ventasTable">
            <thead><tr><th>Fecha</th><th>Cliente</th><th>Productos</th><th>Total</th></tr></thead>
            <tbody id="ventasBody"></tbody>
        </table>
    </div>
    <script>
        const productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        const ventas = JSON.parse(localStorage.getItem('janq_ventas')) || [];
        
        document.getElementById('totalProductos').textContent = productos.length;
        document.getElementById('totalVentas').textContent = ventas.length;
        document.getElementById('ingresos').textContent = '$' + ventas.reduce((s, v) => s + v.total, 0);
        document.getElementById('productosBajoStock').textContent = productos.filter(p => p.stock < 5).length;
        
        const ventasBody = document.getElementById('ventasBody');
        ventasBody.innerHTML = ventas.slice(-20).reverse().map(v => `
            <tr>
                <td>${new Date(v.fecha).toLocaleString()}</td>
                <td>${v.cliente || 'Consumidor final'}</td>
                <td>${v.items.length} productos</td>
                <td>$${v.total.toFixed(2)}</td>
            </tr>
        `).join('');
        
        function exportToCSV() {
            let csv = "Fecha,Cliente,Productos,Total\n";
            ventas.forEach(v => {
                csv += `${new Date(v.fecha).toLocaleString()},${v.cliente || 'Consumidor final'},${v.items.length},${v.total}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `janq_reportes_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
