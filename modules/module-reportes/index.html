<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Reportes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #f8fafc; padding: 20px; border-radius: 16px; text-align: center; }
        .card h3 { font-size: 28px; color: #10B981; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>Reportes</h2>
    <button class="btn" onclick="exportarCSV()">Exportar CSV</button>
    <div class="stats"><div class="card"><i class="fas fa-box"></i><h3 id="totalProductos">0</h3><p>Productos</p></div><div class="card"><i class="fas fa-shopping-cart"></i><h3 id="totalVentas">0</h3><p>Ventas</p></div><div class="card"><i class="fas fa-dollar-sign"></i><h3 id="ingresos">$0</h3><p>Ingresos</p></div><div class="card"><i class="fas fa-chart-line"></i><h3 id="stockBajo">0</h3><p>Stock bajo</p></div></div>
    <h3>Últimas ventas</h3><table id="ventasTable"><thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th></tr></thead><tbody id="ventasBody"></tbody></table>
    <script>
        const productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        const ventas = JSON.parse(localStorage.getItem('janq_ventas')) || [];
        document.getElementById('totalProductos').textContent = productos.length;
        document.getElementById('totalVentas').textContent = ventas.length;
        document.getElementById('ingresos').textContent = '$' + ventas.reduce((s, v) => s + v.total, 0);
        document.getElementById('stockBajo').textContent = productos.filter(p => p.stock < 5).length;
        document.getElementById('ventasBody').innerHTML = ventas.slice(-10).reverse().map(v => `<tr><td>${new Date(v.fecha).toLocaleString()}</td><td>${v.cliente || 'Consumidor'}</td><td>$${v.total}</td></tr>`).join('');
        function exportarCSV() { let csv = "Fecha,Cliente,Total\n" + ventas.map(v => `${new Date(v.fecha).toLocaleString()},${v.cliente || 'Consumidor'},${v.total}`).join('\n'); const blob = new Blob([csv], { type: 'text/csv' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `janq_reportes_${new Date().toISOString().split('T')[0]}.csv`; a.click(); }
    </script>
</body>
</html>
