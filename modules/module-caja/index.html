<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Caja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #f8fafc; padding: 20px; border-radius: 16px; text-align: center; }
        .card h3 { font-size: 32px; color: #10B981; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Arqueo de Caja</h2>
    <div class="stats"><div class="card"><i class="fas fa-shopping-cart"></i><h3 id="ventasHoy">0</h3><p>Ventas hoy</p></div><div class="card"><i class="fas fa-dollar-sign"></i><h3 id="ingresosHoy">$0</h3><p>Ingresos hoy</p></div><div class="card"><i class="fas fa-cash-register"></i><h3 id="efectivoEsperado">$0</h3><p>Efectivo esperado</p></div></div>
    <div><input type="number" id="efectivoContado" placeholder="Efectivo contado"><button class="btn" onclick="arqueo()">Realizar arqueo</button></div>
    <div id="resultado" style="margin-top: 20px;"></div>
    <script>
        const ventas = JSON.parse(localStorage.getItem('janq_ventas')) || [];
        const hoy = new Date().toDateString();
        const ventasHoy = ventas.filter(v => new Date(v.fecha).toDateString() === hoy);
        const total = ventasHoy.reduce((s, v) => s + v.total, 0);
        document.getElementById('ventasHoy').textContent = ventasHoy.length;
        document.getElementById('ingresosHoy').textContent = `$${total}`;
        document.getElementById('efectivoEsperado').textContent = `$${total}`;
        function arqueo() { const contado = parseFloat(document.getElementById('efectivoContado').value); const diff = contado - total; if(Math.abs(diff) < 0.01) document.getElementById('resultado').innerHTML = '<div style="background:#ECFDF5; padding:15px; border-radius:12px; color:#10B981;">✅ Arqueo correcto</div>'; else if(diff > 0) document.getElementById('resultado').innerHTML = `<div style="background:#FEF3C7; padding:15px; border-radius:12px;">⚠️ Sobrante: $${diff.toFixed(2)}</div>`; else document.getElementById('resultado').innerHTML = `<div style="background:#FEF2F2; padding:15px; border-radius:12px;">❌ Faltante: $${Math.abs(diff).toFixed(2)}</div>`; }
    </script>
</body>
</html>
