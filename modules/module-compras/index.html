<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Compras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 15px; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-secondary { background: #64748B; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #1E293B; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 500px;
            max-width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #E2E8F0;
        }
        .stat-card i { font-size: 28px; color: #10B981; margin-bottom: 8px; }
        .stat-card h3 { font-size: 28px; font-weight: 700; }
        .search-box { padding: 10px; border: 1px solid #E2E8F0; border-radius: 8px; width: 250px; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-truck"></i> Compras a Proveedores</h2>
        <div>
            <input type="text" id="searchInput" class="search-box" placeholder="Buscar compra...">
            <button class="btn" onclick="openCompraModal()"><i class="fas fa-plus"></i> Nueva Compra</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-boxes"></i><h3 id="totalCompras">0</h3><p>Total Compras</p></div>
        <div class="stat-card"><i class="fas fa-dollar-sign"></i><h3 id="totalInvertido">$0</h3><p>Total Invertido</p></div>
        <div class="stat-card"><i class="fas fa-calendar"></i><h3 id="comprasMes">0</h3><p>Compras este mes</p></div>
        <div class="stat-card"><i class="fas fa-building"></i><h3 id="totalProveedores">0</h3><p>Proveedores</p></div>
    </div>

    <div style="overflow-x: auto;">
        <table id="comprasTable">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Proveedor</th>
                    <th>Total</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!-- Modal Nueva Compra -->
    <div id="compraModal" class="modal">
        <div class="modal-content">
            <h3>Registrar Compra</h3>
            <select id="productoSelect"></select>
            <input type="number" id="cantidad" placeholder="Cantidad">
            <input type="number" id="precioUnitario" placeholder="Precio unitario de compra">
            <select id="proveedorSelect"></select>
            <input type="text" id="facturaNumero" placeholder="Número de factura (opcional)">
            <button class="btn" onclick="saveCompra()" style="width:100%">Registrar Compra</button>
            <button class="btn btn-secondary" onclick="closeCompraModal()" style="width:100%; margin-top:10px">Cancelar</button>
        </div>
    </div>

    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        let proveedores = JSON.parse(localStorage.getItem('janq_proveedores')) || [];
        let compras = JSON.parse(localStorage.getItem('janq_compras')) || [];

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = compras;
            if (search) {
                filtered = compras.filter(c => 
                    c.productoNombre.toLowerCase().includes(search) || 
                    (c.proveedorNombre && c.proveedorNombre.toLowerCase().includes(search))
                );
            }
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td>${new Date(c.fecha).toLocaleString()}</td>
                    <td><strong>${c.productoNombre}</strong></td>
                    <td>${c.cantidad} u} --
                    <td>$${c.precioUnitario.toFixed(2)}</td>
                    <td>${c.proveedorNombre || '-'}</td>
                    <td><strong>$${c.total.toFixed(2)}</strong></td>
                    <td><span style="background:#DCFCE7; color:#166534; padding:4px 8px; border-radius:12px;">Completada</span></td>
                </tr>
            `).join('');
            actualizarEstadisticas();
        }

        function actualizarEstadisticas() {
            const totalCompras = compras.length;
            const totalInvertido = compras.reduce((sum, c) => sum + c.total, 0);
            const hoy = new Date();
            const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
            const comprasMes = compras.filter(c => new Date(c.fecha) >= inicioMes).length;
            document.getElementById('totalCompras').textContent = totalCompras;
            document.getElementById('totalInvertido').textContent = `$${totalInvertido.toFixed(2)}`;
            document.getElementById('comprasMes').textContent = comprasMes;
            document.getElementById('totalProveedores').textContent = proveedores.length;
        }

        function openCompraModal() {
            // Cargar productos en el select
            const productSelect = document.getElementById('productoSelect');
            productSelect.innerHTML = '<option value="">Seleccione un producto</option>';
            productos.forEach(p => {
                productSelect.innerHTML += `<option value="${p.id}" data-precio="${p.precioCompra || 0}">${p.nombre} - Stock actual: ${p.stock}</option>`;
            });
            
            // Cargar proveedores
            const proveedorSelect = document.getElementById('proveedorSelect');
            proveedorSelect.innerHTML = '<option value="">Seleccione un proveedor</option>';
            proveedores.forEach(p => {
                proveedorSelect.innerHTML += `<option value="${p.id}">${p.nombre}</option>`;
            });
            
            // Limpiar campos
            document.getElementById('cantidad').value = '';
            document.getElementById('precioUnitario').value = '';
            document.getElementById('facturaNumero').value = '';
            
            document.getElementById('compraModal').style.display = 'flex';
        }

        function closeCompraModal() {
            document.getElementById('compraModal').style.display = 'none';
        }

        function saveCompra() {
            const productoId = parseInt(document.getElementById('productoSelect').value);
            const cantidad = parseInt(document.getElementById('cantidad').value);
            let precioUnitario = parseFloat(document.getElementById('precioUnitario').value);
            const proveedorId = document.getElementById('proveedorSelect').value;
            const factura = document.getElementById('facturaNumero').value;
            
            if (!productoId || !cantidad || cantidad <= 0) {
                alert('Seleccione un producto y una cantidad válida');
                return;
            }
            
            const producto = productos.find(p => p.id === productoId);
            if (!producto) return;
            
            // Si no se ingresó precio unitario, usar el precio de compra actual del producto
            if (!precioUnitario || isNaN(precioUnitario) || precioUnitario <= 0) {
                precioUnitario = producto.precioCompra || 0;
                if (precioUnitario <= 0) {
                    alert('Ingrese un precio unitario válido');
                    return;
                }
            }
            
            const proveedor = proveedores.find(p => p.id == proveedorId);
            const total = cantidad * precioUnitario;
            
            // Actualizar stock del producto
            producto.stock = (producto.stock || 0) + cantidad;
            // Actualizar precio de compra si es diferente
            if (producto.precioCompra !== precioUnitario) {
                producto.precioCompra = precioUnitario;
            }
            localStorage.setItem('janq_productos', JSON.stringify(productos));
            
            // Registrar movimiento en kardex
            let movimientos = JSON.parse(localStorage.getItem('janq_movimientos')) || [];
            movimientos.push({
                id: Date.now(),
                productoId: producto.id,
                productoNombre: producto.nombre,
                tipo: 'entrada',
                entrada: cantidad,
                salida: 0,
                stockActual: producto.stock,
                referencia: `Compra a ${proveedor?.nombre || 'Proveedor'} - Factura: ${factura || 'N/A'}`,
                fecha: new Date().toISOString()
            });
            localStorage.setItem('janq_movimientos', JSON.stringify(movimientos));
            
            // Registrar compra
            const nuevaCompra = {
                id: Date.now(),
                fecha: new Date().toISOString(),
                productoId: producto.id,
                productoNombre: producto.nombre,
                cantidad: cantidad,
                precioUnitario: precioUnitario,
                total: total,
                proveedorId: proveedorId ? parseInt(proveedorId) : null,
                proveedorNombre: proveedor?.nombre || 'Proveedor',
                factura: factura || null
            };
            compras.push(nuevaCompra);
            localStorage.setItem('janq_compras', JSON.stringify(compras));
            
            // Actualizar interfaces
            renderTable();
            closeCompraModal();
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
            alert(`Compra registrada. Stock actualizado a ${producto.stock} unidades.`);
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        
        renderTable();
        actualizarEstadisticas();
    </script>
</body>
</html>
