<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Compras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .header { display: flex; justify-content: space-between; margin-bottom: 24px; }
        .btn-primary { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #F8FAFC; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 500px;
        }
        .modal-content select, .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }
        .btn-save { background: #10B981; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-truck"></i> Compras a Proveedores</h2>
        <button class="btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Nueva Compra</button>
    </div>
    <div style="overflow-x: auto;">
        <table id="comprasTable">
            <thead>
                <tr><th>Producto</th><th>Cantidad</th><th>Proveedor</th><th>Fecha</th><th>Total</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Registrar Compra</h3>
            <select id="productoSelect"></select>
            <input type="number" id="cantidad" placeholder="Cantidad">
            <select id="proveedorSelect"></select>
            <button class="btn-save" onclick="saveCompra()">Guardar Compra</button>
        </div>
    </div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        let proveedores = JSON.parse(localStorage.getItem('janq_proveedores')) || [];
        let compras = JSON.parse(localStorage.getItem('janq_compras')) || [];
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = compras.map(c => `
                <tr>
                    <td>${c.productoNombre}</td>
                    <td>${c.cantidad}</td>
                    <td>${c.proveedorNombre}</td>
                    <td>${new Date(c.fecha).toLocaleDateString()}</td>
                    <td>$${c.total}</td>
                </tr>
            `).join('');
        }
        
        function openModal() {
            const productSelect = document.getElementById('productoSelect');
            const proveedorSelect = document.getElementById('proveedorSelect');
            productSelect.innerHTML = productos.map(p => `<option value="${p.id}">${p.nombre} - $${p.precioCompra}</option>`).join('');
            proveedorSelect.innerHTML = proveedores.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function saveCompra() {
            const productId = parseInt(document.getElementById('productoSelect').value);
            const proveedorId = parseInt(document.getElementById('proveedorSelect').value);
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const producto = productos.find(p => p.id === productId);
            const proveedor = proveedores.find(p => p.id === proveedorId);
            
            if (producto && cantidad) {
                producto.stock += cantidad;
                localStorage.setItem('janq_productos', JSON.stringify(productos));
                
                compras.push({
                    id: Date.now(),
                    productoId: productId,
                    productoNombre: producto.nombre,
                    cantidad: cantidad,
                    proveedorId: proveedorId,
                    proveedorNombre: proveedor?.nombre || 'Proveedor',
                    fecha: new Date().toISOString(),
                    total: producto.precioCompra * cantidad
                });
                localStorage.setItem('janq_compras', JSON.stringify(compras));
                renderTable();
                closeModal();
                if (window.parent && window.parent.loadStats) window.parent.loadStats();
                alert('Compra registrada correctamente');
            }
        }
        
        renderTable();
    </script>
</body>
</html>
