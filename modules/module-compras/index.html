<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanQ - Compras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: white; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 15px; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .btn-secondary { background: #64748B; }
        .search-box { padding: 10px; border: 1px solid #E2E8F0; border-radius: 8px; width: 250px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #1E293B; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 450px;
            max-width: 90%;
        }
        .modal-content select, .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #F8FAFC;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-card h3 { font-size: 28px; color: #10B981; }
    </style>
</head>
<body>
    <div class="header">
        <h2><i class="fas fa-truck"></i> Compras a Proveedores</h2>
        <div>
            <button class="btn" id="newPurchaseBtn"><i class="fas fa-plus"></i> Registrar Compra</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-shopping-cart"></i><h3 id="totalCompras">0</h3><p>Compras registradas</p></div>
        <div class="stat-card"><i class="fas fa-box"></i><h3 id="totalProductos">0</h3><p>Productos actualizados</p></div>
        <div class="stat-card"><i class="fas fa-building"></i><h3 id="totalProveedores">0</h3><p>Proveedores activos</p></div>
    </div>

    <div style="overflow-x: auto;">
        <table id="comprasTable">
            <thead><tr><th>Producto</th><th>Cantidad</th><th>Proveedor</th><th>Fecha</th><th>Total</th></tr></thead>
            <tbody id="comprasBody"></tbody>
        </table>
    </div>

    <!-- Modal para nueva compra -->
    <div id="purchaseModal" class="modal">
        <div class="modal-content">
            <h3>Registrar Compra</h3>
            <select id="productoSelect"></select>
            <input type="number" id="cantidad" placeholder="Cantidad" value="1" min="1">
            <select id="proveedorSelect"></select>
            <button class="btn" id="savePurchaseBtn" style="width:100%">Guardar Compra</button>
            <button class="btn btn-secondary" id="closeModalBtn" style="width:100%; margin-top:10px">Cancelar</button>
            <div id="purchaseFeedback" style="margin-top:10px; font-size:12px;"></div>
        </div>
    </div>

    <script>
        // ==================== DATA (cargar una sola vez) ====================
        let productos = [];
        let proveedores = [];
        let compras = [];
        
        function loadData() {
            productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
            proveedores = JSON.parse(localStorage.getItem('janq_proveedores')) || [];
            compras = JSON.parse(localStorage.getItem('janq_compras')) || [];
            updateStats();
            renderCompras();
        }
        
        function saveCompras() {
            localStorage.setItem('janq_compras', JSON.stringify(compras));
        }
        
        function saveProductos() {
            localStorage.setItem('janq_productos', JSON.stringify(productos));
        }
        
        function updateStats() {
            document.getElementById('totalCompras').innerText = compras.length;
            document.getElementById('totalProductos').innerText = productos.length;
            document.getElementById('totalProveedores').innerText = proveedores.length;
        }
        
        function renderCompras() {
            const tbody = document.getElementById('comprasBody');
            if (compras.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No hay compras registradas</td></tr>';
                return;
            }
            // Mostrar últimas 20 compras primero
            const lastCompras = [...compras].reverse().slice(0, 50);
            tbody.innerHTML = lastCompras.map(c => `
                <tr>
                    <td>${escapeHtml(c.productoNombre)}</td>
                    <td>${c.cantidad}</td>
                    <td>${escapeHtml(c.proveedorNombre)}</td>
                    <td>${new Date(c.fecha).toLocaleDateString()}</td>
                    <td>$${c.total.toFixed(2)}</td>
                </tr>
            `).join('');
        }
        
        // ==================== REGISTRAR COMPRA ====================
        function openPurchaseModal() {
            // Llenar selects con datos actuales
            const productSelect = document.getElementById('productoSelect');
            const proveedorSelect = document.getElementById('proveedorSelect');
            productSelect.innerHTML = '<option value="">Seleccione producto</option>' + 
                productos.map(p => `<option value="${p.id}" data-precio="${p.precioCompra || p.precioVenta || 0}">${escapeHtml(p.nombre)} - Stock: ${p.stock}</option>`).join('');
            proveedorSelect.innerHTML = '<option value="">Seleccione proveedor</option>' + 
                proveedores.map(p => `<option value="${p.id}">${escapeHtml(p.nombre)}</option>`).join('');
            document.getElementById('cantidad').value = '1';
            document.getElementById('purchaseFeedback').innerHTML = '';
            document.getElementById('purchaseModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('purchaseModal').style.display = 'none';
        }
        
        async function savePurchase() {
            const productId = parseInt(document.getElementById('productoSelect').value);
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const proveedorId = parseInt(document.getElementById('proveedorSelect').value);
            
            if (!productId || !cantidad || !proveedorId) {
                document.getElementById('purchaseFeedback').innerHTML = '<span style="color:#DC2626">Complete todos los campos</span>';
                return;
            }
            
            const producto = productos.find(p => p.id === productId);
            const proveedor = proveedores.find(p => p.id === proveedorId);
            if (!producto || !proveedor) return;
            
            const precioUnitario = producto.precioCompra || producto.precioVenta || 0;
            const total = precioUnitario * cantidad;
            
            // Mostrar loading en el botón
            const saveBtn = document.getElementById('savePurchaseBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<span class="loading"></span> Guardando...';
            saveBtn.disabled = true;
            
            // Simular pequeño retraso para UI (pero rápido)
            setTimeout(() => {
                // Actualizar stock del producto
                producto.stock = (producto.stock || 0) + cantidad;
                saveProductos();
                
                // Registrar movimiento en kardex
                let movimientos = JSON.parse(localStorage.getItem('janq_movimientos')) || [];
                movimientos.push({
                    id: Date.now(),
                    productoId: producto.id,
                    productoNombre: producto.nombre,
                    tipo: 'entrada',
                    entrada: cantidad,
                    salida: 0,
                    stockActual: producto.stock,
                    referencia: `Compra a ${proveedor.nombre}`,
                    fecha: new Date().toISOString()
                });
                localStorage.setItem('janq_movimientos', JSON.stringify(movimientos));
                
                // Registrar compra
                const nuevaCompra = {
                    id: Date.now(),
                    productoId: productId,
                    productoNombre: producto.nombre,
                    cantidad: cantidad,
                    proveedorId: proveedorId,
                    proveedorNombre: proveedor.nombre,
                    fecha: new Date().toISOString(),
                    total: total
                };
                compras.push(nuevaCompra);
                saveCompras();
                
                // Actualizar UI
                renderCompras();
                updateStats();
                
                // Cerrar modal y mostrar feedback
                closeModal();
                document.getElementById('purchaseFeedback').innerHTML = '<span style="color:#10B981">✅ Compra registrada correctamente</span>';
                setTimeout(() => {
                    document.getElementById('purchaseFeedback').innerHTML = '';
                }, 2000);
                
                // Actualizar dashboard principal si existe
                if (window.parent && window.parent.loadStats) window.parent.loadStats();
                
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }, 50); // Pequeño delay para mostrar el loading, pero casi instantáneo
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ==================== EVENTOS ====================
        document.getElementById('newPurchaseBtn').addEventListener('click', openPurchaseModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('savePurchaseBtn').addEventListener('click', savePurchase);
        
        // Cargar datos al iniciar
        loadData();
        
        // Recargar datos si cambian desde otro lugar (opcional)
        window.addEventListener('storage', function(e) {
            if (e.key === 'janq_productos' || e.key === 'janq_proveedores' || e.key === 'janq_compras') {
                loadData();
            }
        });
    </script>
</body>
</html>
