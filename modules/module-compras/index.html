<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Compras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .btn { background: #10B981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 400px; }
        select, input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Compras</h2>
    <button class="btn" onclick="openModal()">+ Registrar Compra</button>
    <table><thead><tr><th>Producto</th><th>Cantidad</th><th>Proveedor</th><th>Fecha</th><th>Total</th></tr></thead><tbody id="tbody"></tbody></table>
    <div id="modal" class="modal"><div class="modal-content"><h3>Nueva Compra</h3><select id="producto"></select><input id="cantidad" placeholder="Cantidad"><select id="proveedor"></select><button class="btn" onclick="save()">Guardar</button></div></div>
    <script>
        let productos = JSON.parse(localStorage.getItem('janq_productos')) || [];
        let proveedores = JSON.parse(localStorage.getItem('janq_proveedores')) || [];
        let compras = JSON.parse(localStorage.getItem('janq_compras')) || [];
        function render() { document.getElementById('tbody').innerHTML = compras.map(c => `<tr><td>${c.productoNombre}</td><td>${c.cantidad}</td><td>${c.proveedorNombre}</td><td>${new Date(c.fecha).toLocaleDateString()}</td><td>$${c.total}</td></tr>`).join(''); }
        function openModal() { document.getElementById('producto').innerHTML = productos.map(p => `<option value="${p.id}">${p.nombre} - $${p.precioCompra || p.precio}</option>`).join(''); document.getElementById('proveedor').innerHTML = proveedores.map(p => `<option value="${p.id}">${p.nombre}</option>`).join(''); document.getElementById('modal').style.display = 'flex'; }
        function save() { const pid = parseInt(document.getElementById('producto').value); const cantidad = parseInt(document.getElementById('cantidad').value); const prid = parseInt(document.getElementById('proveedor').value); const producto = productos.find(p => p.id === pid); const proveedor = proveedores.find(p => p.id === prid); if(producto && cantidad) { producto.stock += cantidad; localStorage.setItem('janq_productos', JSON.stringify(productos)); compras.push({ id: Date.now(), productoId: pid, productoNombre: producto.nombre, cantidad: cantidad, proveedorId: prid, proveedorNombre: proveedor?.nombre || 'Proveedor', fecha: new Date().toISOString(), total: (producto.precioCompra || producto.precio) * cantidad }); localStorage.setItem('janq_compras', JSON.stringify(compras)); render(); document.getElementById('modal').style.display = 'none'; if(window.parent.loadStats) window.parent.loadStats(); alert('Compra registrada'); } }
        render();
    </script>
</body>
</html>
