<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JanQ - Compras</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; background: white; }
        .btn { background: #10B981; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 400px; }
        select, input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>
    <h2>Compras</h2>
    <button class="btn" onclick="openModal()">+ Registrar Compra</button>
    <table id="table">
        <thead><tr><th>Producto</th><th>Cantidad</th><th>Proveedor</th><th>Fecha</th><th>Total</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Nueva Compra</h3>
            <select id="productoSelect"></select>
            <input type="number" id="cantidad" placeholder="Cantidad">
            <select id="proveedorSelect"></select>
            <button class="btn" onclick="saveCompra()">Guardar</button>
            <button class="btn" style="background:#ccc;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
    <script src="../../db.js"></script>
    <script>
        let companyId = null;
        let productos = [];
        let proveedores = [];
        let compras = [];

        async function init() {
            const company = JanQ.getCurrentCompany();
            if (!company) {
                window.location.href = '../../index.html';
                return;
            }
            companyId = company.id;
            await loadData();
        }
        async function loadData() {
            productos = await JanQ.getProductos(companyId);
            proveedores = await JanQ.getProveedores(companyId);
            compras = await JanQ.getCompras(companyId);
            renderCompras();
        }
        function renderCompras() {
            const tbody = document.getElementById('tbody');
            if (compras.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No hay compras</td></tr>';
                return;
            }
            tbody.innerHTML = compras.map(c => `
                <tr>
                    <td>${c.productoNombre}</td>
                    <td>${c.cantidad}</td>
                    <td>${c.proveedorNombre}</td>
                    <td>${new Date(c.fecha).toLocaleDateString()}</td>
                    <td>$${c.total}</td>
                </tr>
            `).join('');
        }
        function openModal() {
            document.getElementById('productoSelect').innerHTML = productos.map(p => `<option value="${p.id}">${p.nombre} - Stock: ${p.stock}</option>`).join('');
            document.getElementById('proveedorSelect').innerHTML = proveedores.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        async function saveCompra() {
            const productoId = document.getElementById('productoSelect').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const proveedorId = document.getElementById('proveedorSelect').value;
            if (!productoId || !cantidad || !proveedorId) return;
            const producto = productos.find(p => p.id === productoId);
            const proveedor = proveedores.find(p => p.id === proveedorId);
            if (!producto || !proveedor) return;
            const total = (producto.precio || 0) * cantidad;
            // Actualizar stock
            producto.stock += cantidad;
            await JanQ.updateProducto(companyId, productoId, { stock: producto.stock });
            // Registrar compra
            const nuevaCompra = {
                productoId, productoNombre: producto.nombre, cantidad, proveedorId, proveedorNombre: proveedor.nombre, total,
                fecha: new Date().toISOString()
            };
            await JanQ.addCompra(companyId, nuevaCompra);
            // Movimiento kardex
            await JanQ.addMovimiento(companyId, {
                productoId, productoNombre: producto.nombre, tipo: 'entrada', entrada: cantidad, salida: 0,
                stockActual: producto.stock, referencia: `Compra a ${proveedor.nombre}`
            });
            await loadData();
            closeModal();
            alert('Compra registrada');
            if (window.parent && window.parent.loadStats) window.parent.loadStats();
        }
        init();
    </script>
</body>
</html>
